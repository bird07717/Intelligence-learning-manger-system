services:
  mysql:
    image: mysql:8.4
    container_name: learning_manager_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: learning_manager
      MYSQL_USER: learning_user
      MYSQL_PASSWORD: learning_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

